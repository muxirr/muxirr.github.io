<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Config</title>
	</head>
	<body>
		<!-- <h1><a href="./source/jlu_network.html" target="_blank">1.JLU-Network</a></h1>
        <h1><a href="./source/wallpaper.html" target="_blank">#.Code Wallpaper</h1> -->
		<button width="100px" height="auto" onclick="loadContent()">111</button>
	</body>
	<script>
		function loadContent() {
			const xhr = new XMLHttpRequest();
			xhr.open(
				"GET",
				"https://muxirr.github.io/source/wallpaper.html",
				true
			); // 发送 GET 请求获取 content.html
			xhr.onreadystatechange = function () {
				if (xhr.readyState === 4 && xhr.status === 200) {
					document.getElementById("content").innerHTML =
						xhr.responseText; // 更新页面内容
				}
			};
			xhr.send();
		}
	</script>
</html>
